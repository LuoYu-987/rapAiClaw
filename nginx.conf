server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # 支持 VitePress cleanUrls，直接访问 /mcp/desktop 时回退到 /mcp/desktop.html
        try_files $uri $uri/ $uri.html =404;
    }

    location ~* \.(?:css|js|mjs|json|png|jpg|jpeg|gif|svg|webp|ico|woff2?)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
