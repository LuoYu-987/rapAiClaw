services:
  rpa-ai-claw-page:
    image: nginx:1.27-alpine
    container_name: rpa-ai-claw-page
    restart: unless-stopped
    ports:
      - "${RPA_AI_CLAW_PAGE_PORT:-80}:80"
    volumes:
      # 先在宿主机执行打包命令，VitePress 默认产物目录为 docs/.vitepress/dist
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
